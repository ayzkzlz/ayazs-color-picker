<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      background: rgba(15, 15, 15, 0.95);
      border: 1px solid #333;
      border-radius: 12px;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      box-sizing: border-box;
      user-select: none;
    }
    input {
      background: transparent;
      border: none;
      color: #fff;
      font-size: 26px;
      font-weight: 300;
      text-align: center;
      width: 100%;
      outline: none;
      cursor: pointer;
      letter-spacing: 2px;
    }
    p {
      color: #666;
      font-size: 10px;
      margin-top: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <input type="text" id="shortcut-input" readonly>
  <p>Kaydetmek için ENTER • Çıkmak için ESC</p>
  <script src="settings.js"></script>
</body>
</html>
