<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: transparent; /* TAMAMEN GÖRÜNMEZ */
      cursor: default;
    }
    body.picking {
      cursor: crosshair !important;
    }
    /* Sadece menü açıkken canvas görünür olur, böylece alttaki uygulamalar tıklanmaz */
    canvas {
      display: none;
    }
    body.picking canvas {
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="screen-canvas"></canvas>
  <script src="renderer.js"></script>
</body>
</html>
